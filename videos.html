<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Videos</title>
<style>
body {
  margin: 0;
  background: #0b0d12;
  color: #e6e9f0;
  font-family: Arial, sans-serif;
  padding: 16px;
}
h1 {
  font-size: 22px;
  margin: 0 0 16px;
  color: #f4b43a;
}
.file-list {
  list-style: none;
  margin: 0;
  padding: 0;
}
.file-list li {
  margin-bottom: 12px;
}
.file-list a {
  display: block;
  padding: 14px 16px;
  background: #121622;
  border: 2px solid #f4b43a;
  border-radius: 10px;
  color: #e6e9f0;
  text-decoration: none;
  font-size: 17px;
}
.file-list a:focus,
.file-list a:active {
  background: #f4b43a;
  color: #101215;
  outline: none;
}
.loading {
  color: #a5adba;
  font-size: 15px;
  margin-top: 16px;
}
.error {
  color: #ff7a59;
  font-size: 14px;
  margin-top: 16px;
}
</style>
</head>
<body>
<h1>Videos</h1>
<div id="content"><p class="loading">Loading video list...</p></div>

<script>
// ── CONFIG ────────────────────────────────────────────────────
var SCRIPT_URL   = "https://script.google.com/macros/s/AKfycbyYQJa95ghXgJjLDsRlVCtAMa8vh5dTN_8hD0DgcM7uQsDqTWLfRme53nogvfzd_hZv/exec";
var DRIVE_API_KEY = "AIzaSyCOJD0ul-OvUCk2L1dUO0c_J4Zl9xEFFDE";
// ─────────────────────────────────────────────────────────────

var content = document.getElementById("content");

function driveStreamUrl(id) {
  return "https://www.googleapis.com/drive/v3/files/"
    + id + "?alt=media&key=" + DRIVE_API_KEY;
}

function basename(f) {
  var d = f.lastIndexOf(".");
  return d > 0 ? f.slice(0, d) : f;
}

function showList(files) {
  if (!files || !files.length) {
    content.innerHTML = "<p class='error'>No videos found. Check your folder ID.</p>";
    return;
  }

  files.sort(function(a, b) {
    return a.name < b.name ? -1 : a.name > b.name ? 1 : 0;
  });

  var ul = document.createElement("ul");
  ul.className = "file-list";

  for (var i = 0; i < files.length; i++) {
    var f = files[i];
    if (f.error || !f.id) continue;
    if (f.mimeType !== "video/mp4" && f.mimeType !== "video/webm") continue;

    var li = document.createElement("li");
    var a  = document.createElement("a");
    a.href = driveStreamUrl(f.id);
    a.textContent = basename(f.name);
    li.appendChild(a);
    ul.appendChild(li);
  }

  content.innerHTML = "";
  content.appendChild(ul);
}

function showError(msg) {
  content.innerHTML = "<p class='error'>" + msg + "</p>";
}

// JSONP — the only reliable cross-origin fetch on old WebKit
function jsonpLoad(url, cbName, callback) {
  window[cbName] = function(data) {
    window[cbName] = undefined;
    try { document.head.removeChild(script); } catch(e) {}
    callback(data);
  };

  var script = document.createElement("script");
  var sep    = url.indexOf("?") >= 0 ? "&" : "?";
  script.src = url + sep + "action=list&callback=" + cbName;

  script.onerror = function() {
    try { document.head.removeChild(script); } catch(e) {}
    showError("Could not load video list. Check SCRIPT_URL.");
  };

  document.head.appendChild(script);
}

// Boot
if (!SCRIPT_URL || SCRIPT_URL === "YOUR_APPS_SCRIPT_WEB_APP_URL_HERE") {
  showError("Set SCRIPT_URL in the HTML file.");
} else if (!DRIVE_API_KEY || DRIVE_API_KEY === "YOUR_GOOGLE_DRIVE_API_KEY_HERE") {
  showError("Set DRIVE_API_KEY in the HTML file.");
} else {
  jsonpLoad(SCRIPT_URL, "__vidcb", function(data) {
    var files = data && data.files ? data.files : (Array.isArray(data) ? data : []);
    showList(files);
  });
}
</script>
</body>
</html>
