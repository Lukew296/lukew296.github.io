<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Videos</title>
  <style>
    :root {
      --bg: #0b0d12; --panel: #121622; --panel-2: #0f1320;
      --text: #e6e9f0; --muted: #a5adba;
      --accent: #f4b43a; --accent-2: #ff7a59;
      --border: rgba(255,255,255,0.12);
      --shadow: 0 12px 40px rgba(0,0,0,0.45);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Space Grotesk","Segoe UI",Tahoma,sans-serif;
      background:
        radial-gradient(1200px 600px at 20% -10%, rgba(244,180,58,0.18), transparent 60%),
        radial-gradient(900px 500px at 90% 10%, rgba(255,122,89,0.16), transparent 60%),
        var(--bg);
      color: var(--text); min-height: 100vh;
    }
    .page { max-width: 1100px; margin: 0 auto; padding: 32px 20px 60px; }
    .hero {
      display: flex; flex-wrap: wrap; gap: 24px;
      align-items: flex-end; justify-content: space-between;
      border-bottom: 1px solid var(--border);
      padding-bottom: 24px; margin-bottom: 28px;
    }
    .hero h1 { font-size: clamp(26px,4vw,40px); margin: 0 0 8px; letter-spacing: .5px; }
    .hero p  { margin: 0; color: var(--muted); max-width: 560px; line-height: 1.5; }
    .status {
      font-size: 14px; color: var(--muted);
      background: var(--panel-2); border: 1px solid var(--border);
      padding: 10px 12px; border-radius: 10px;
      box-shadow: var(--shadow); min-width: 220px;
    }
    .layout { display: grid; grid-template-columns: minmax(0,1.2fr) minmax(0,0.8fr); gap: 24px; }
    @media (max-width:900px) { .layout { grid-template-columns: 1fr; } }
    .panel {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 16px; box-shadow: var(--shadow); padding: 18px;
    }
    .viewer { display: grid; gap: 16px; }
    .display {
      position: relative; background: #05060a;
      border-radius: 14px; overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
      width: 100%; height: 0; padding-top: 56.25%;
    }
    canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
    .source-video {
      position: fixed; left: -9999px; top: 0;
      width: 2px; height: 2px; opacity: 0; pointer-events: none;
    }
    .overlay {
      position: absolute; left: 14px; bottom: 12px;
      background: rgba(5,6,10,0.75); color: var(--text);
      padding: 8px 12px; border-radius: 8px; font-size: 13px;
    }
    .controls { display: grid; gap: 12px; }
    label { font-size: 13px; color: var(--muted); }
    select, button {
      width: 100%; padding: 10px 12px; border-radius: 10px;
      border: 1px solid var(--border); background: #0d111b;
      color: var(--text); font-size: 15px; font-family: inherit;
    }
    button {
      cursor: pointer;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #101215; font-weight: 600;
    }
    button.secondary { background: transparent; color: var(--text); }
    .info { font-size: 14px; color: var(--muted); line-height: 1.6; }
    .file-list { display: grid; gap: 8px; max-height: 280px; overflow: auto; padding-right: 4px; }
    .file-pill {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 10px; border-radius: 10px; background: #0c1018;
      border: 1px solid rgba(255,255,255,0.08); font-size: 13px; color: var(--muted);
    }
    .file-pill span { color: var(--text); }
    .progress-bar-wrap {
      display: none; height: 4px; background: rgba(255,255,255,0.08);
      border-radius: 2px; overflow: hidden; margin-top: 4px;
    }
    .progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), var(--accent-2)); transition: width .2s; }
  </style>
</head>
<body>
<div class="page">
  <div class="hero">
    <div>
      <h1>Frame-by-Frame Video Player</h1>
      <p>Videos download through an Apps Script proxy then play frame-by-frame on canvas.</p>
    </div>
    <div class="status" id="status">Loading videos from Google Drive…</div>
  </div>

  <div class="layout">
    <div class="panel viewer">
      <div class="display">
        <canvas id="display" width="1280" height="720"></canvas>
        <div class="overlay" id="overlay">Idle</div>
      </div>
      <div class="controls">
        <div>
          <label for="fileSelect">Choose a file</label>
          <select id="fileSelect"></select>
        </div>
        <div class="progress-bar-wrap" id="progressWrap">
          <div class="progress-bar" id="progressBar"></div>
        </div>
        <button id="playButton">▶ Play</button>
        <button id="stopButton" class="secondary">■ Stop</button>
      </div>
    </div>

    <div class="panel">
      <h2 style="margin-top:0;">Library</h2>
      <p class="info">Files stream via Apps Script proxy — no CORS issues. Supported: <code>.mp4</code>, <code>.webm</code>.</p>
      <div class="file-list" id="fileList"></div>
      <p class="info" id="hint"></p>
    </div>
  </div>
</div>

<video id="sourceVideo" class="source-video" preload="auto" playsinline webkit-playsinline muted></video>

<script>
(function () {

  // ── CONFIG ───────────────────────────────────────────────────────────────────
  var SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyYQJa95ghXgJjLDsRlVCtAMa8vh5dTN_8hD0DgcM7uQsDqTWLfRme53nogvfzd_hZv/exec";
  // ─────────────────────────────────────────────────────────────────────────────

  var videoEl    = document.getElementById("sourceVideo");
  var canvas     = document.getElementById("display");
  var ctx        = canvas.getContext("2d");
  var overlay    = document.getElementById("overlay");
  var statusEl   = document.getElementById("status");
  var selectEl   = document.getElementById("fileSelect");
  var listEl     = document.getElementById("fileList");
  var hintEl     = document.getElementById("hint");
  var playBtn    = document.getElementById("playButton");
  var stopBtn    = document.getElementById("stopButton");
  var progWrap   = document.getElementById("progressWrap");
  var progBar    = document.getElementById("progressBar");

  var videoItems         = [];
  var activeItem         = null;
  var rafId              = null;
  var frameCount         = 0;
  var lastTimestamp      = Date.now();
  var lastPresentedFrame = 0;
  var currentBlobUrl     = null;
  var usesVfc = typeof videoEl.requestVideoFrameCallback === "function";

  function setStatus(t) { statusEl.textContent = t; }
  function basename(f)  { var d = f.lastIndexOf("."); return d > 0 ? f.slice(0, d) : f; }
  function nowMs()      { return window.performance ? window.performance.now() : Date.now(); }

  function proxyUrl(id) {
    return SCRIPT_URL + (SCRIPT_URL.indexOf("?") >= 0 ? "&" : "?") + "action=stream&id=" + encodeURIComponent(id);
  }

  // ── Canvas ───────────────────────────────────────────────────────────────────
  function resizeCanvas() {
    var r = canvas.getBoundingClientRect();
    var w = Math.max(1, Math.floor(r.width));
    var h = Math.max(1, Math.floor(r.height));
    if (canvas.width !== w || canvas.height !== h) { canvas.width = w; canvas.height = h; }
  }
  function clearDisplay() {
    resizeCanvas();
    ctx.fillStyle = "#05060a";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  // ── Playback ─────────────────────────────────────────────────────────────────
  function stopPlayback() {
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
    videoEl.pause();
    if (currentBlobUrl) { URL.revokeObjectURL(currentBlobUrl); currentBlobUrl = null; }
    overlay.textContent = "Stopped";
    progWrap.style.display = "none";
  }

  function updateOverlay() {
    var now = nowMs(), delta = now - lastTimestamp;
    if (delta > 450) {
      overlay.textContent = "Frames: " + frameCount + " | " + (frameCount / (delta / 1000)).toFixed(1) + " fps";
      frameCount = 0; lastTimestamp = now;
    }
  }

  function drawFrame() {
    if (videoEl.readyState >= 2 && !videoEl.paused && !videoEl.ended) {
      resizeCanvas();
      ctx.drawImage(videoEl, 0, 0, canvas.width, canvas.height);
      frameCount++;
      updateOverlay();
    }
  }

  function frameLoop() {
    drawFrame();
    if (!videoEl.paused && !videoEl.ended) rafId = requestAnimationFrame(frameLoop);
  }

  function runLoop() {
    lastTimestamp = nowMs(); frameCount = 0; lastPresentedFrame = 0;
    if (!usesVfc) { frameLoop(); return; }
    var cb = function(_, meta) {
      if (videoEl.paused || videoEl.ended) return;
      if (meta && meta.presentedFrames !== lastPresentedFrame) {
        lastPresentedFrame = meta.presentedFrames;
        resizeCanvas();
        ctx.drawImage(videoEl, 0, 0, canvas.width, canvas.height);
        frameCount++; updateOverlay();
      }
      videoEl.requestVideoFrameCallback(cb);
    };
    videoEl.requestVideoFrameCallback(cb);
  }

  // Convert base64 string to Uint8Array
  function b64ToBytes(b64) {
    var bin = atob(b64);
    var bytes = new Uint8Array(bin.length);
    for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    return bytes;
  }

  function playVideo(item) {
    stopPlayback();
    clearDisplay();
    overlay.textContent = "Downloading…";
    setStatus("Downloading " + item.label + " via proxy…");
    progWrap.style.display = "block";
    progBar.style.width = "0%";

    // Animate indeterminate progress while fetching
    var fakeProgress = 0;
    var progressTimer = setInterval(function() {
      fakeProgress = Math.min(fakeProgress + Math.random() * 8, 85);
      progBar.style.width = fakeProgress + "%";
    }, 300);

    fetch(proxyUrl(item.id))
      .then(function(r) {
        if (!r.ok) throw new Error("Proxy HTTP " + r.status);
        return r.json();
      })
      .then(function(json) {
        clearInterval(progressTimer);

        if (json.error) throw new Error("Script error: " + json.error);
        if (!json.data)  throw new Error("No data returned from proxy");

        progBar.style.width = "95%";

        // Decode base64 → Uint8Array → Blob → Object URL
        var bytes    = b64ToBytes(json.data);
        var mimeType = json.mimeType || item.mimeType || "video/mp4";
        var blob     = new Blob([bytes], { type: mimeType });
        currentBlobUrl = URL.createObjectURL(blob);

        progBar.style.width = "100%";
        overlay.textContent = "Buffering…";

        videoEl.src = currentBlobUrl;
        videoEl.load();

        videoEl.oncanplay = function() {
          videoEl.oncanplay = null;
          progWrap.style.display = "none";
          setStatus("Playing: " + item.label);
          videoEl.play().then(function() {
            overlay.textContent = "Playing (frame-by-frame)";
            runLoop();
          }).catch(function(err) {
            overlay.textContent = "Autoplay blocked — press Play again";
            console.warn("Play blocked:", err);
          });
        };

        videoEl.onerror = function() {
          videoEl.onerror = null;
          var code = videoEl.error ? videoEl.error.code : "?";
          overlay.textContent = "Playback error (code " + code + ")";
          setStatus("Video decode failed for " + item.label + ". Try a different file.");
          console.error("Video error code:", code, videoEl.error);
          progWrap.style.display = "none";
        };
      })
      .catch(function(err) {
        clearInterval(progressTimer);
        overlay.textContent = "Download failed";
        setStatus("Error: " + err.message);
        console.error("Proxy fetch error:", err);
        progWrap.style.display = "none";
      });
  }

  // ── Library UI ───────────────────────────────────────────────────────────────
  function renderList(files) {
    listEl.innerHTML = "";
    files.forEach(function(f) {
      var pill = document.createElement("div"); pill.className = "file-pill";
      var n = document.createElement("span"); n.textContent = f.label;
      var e = document.createElement("span"); e.textContent = f.ext || "video";
      pill.appendChild(n); pill.appendChild(e); listEl.appendChild(pill);
    });
  }

  function buildSelect(files) {
    selectEl.innerHTML = "";
    files.forEach(function(f, i) {
      var o = document.createElement("option");
      o.value = String(i); o.textContent = f.label;
      selectEl.appendChild(o);
    });
  }

  // ── JSONP ────────────────────────────────────────────────────────────────────
  function jsonpLoad(url, callback) {
    var cbName = "__driveIdx_" + Date.now();
    var script = document.createElement("script");
    var timer  = setTimeout(function() {
      cleanup(); callback(new Error("JSONP timeout"), null);
    }, 15000);

    function cleanup() {
      clearTimeout(timer);
      if (script.parentNode) script.parentNode.removeChild(script);
      delete window[cbName];
    }

    window[cbName] = function(data) { cleanup(); callback(null, data); };
    script.src = url + (url.indexOf("?") >= 0 ? "&" : "?") + "action=list&callback=" + cbName;
    script.onerror = function() { cleanup(); callback(new Error("JSONP script load failed"), null); };
    document.head.appendChild(script);
  }

  function parseFiles(data) {
    var list = Array.isArray(data) ? data
             : (data && Array.isArray(data.files)) ? data.files : [];
    return list.filter(function(e) {
      return e && !e.error && e.id && (e.mimeType === "video/mp4" || e.mimeType === "video/webm");
    }).map(function(e) {
      return { name: e.name, label: basename(e.name),
               ext: e.mimeType === "video/mp4" ? "mp4" : "webm",
               mimeType: e.mimeType, id: e.id };
    });
  }

  // ── Bootstrap ─────────────────────────────────────────────────────────────────
  function loadFiles() {
    if (!SCRIPT_URL || SCRIPT_URL === "YOUR_APPS_SCRIPT_WEB_APP_URL_HERE") {
      setStatus("⚠️  Set SCRIPT_URL in videos.html first.");
      hintEl.textContent = "Replace YOUR_APPS_SCRIPT_WEB_APP_URL_HERE with your Apps Script URL.";
      return;
    }
    setStatus("Fetching file list…");
    jsonpLoad(SCRIPT_URL, function(err, data) {
      if (err) { setStatus("List failed: " + err.message); return; }
      var files = parseFiles(data);
      videoItems = files;
      if (!files.length) {
        setStatus("No MP4/WEBM files found in Drive folder.");
        hintEl.textContent = "Check the FOLDER_ID in the Apps Script.";
        overlay.textContent = "Idle"; return;
      }
      files.sort(function(a, b) { return a.label.localeCompare(b.label); });
      renderList(files); buildSelect(files);
      activeItem = files[0]; selectEl.value = "0";
      setStatus("Loaded " + files.length + " file(s) from Google Drive.");
      hintEl.textContent = "Select a video and press Play.";
      overlay.textContent = "Ready";
    });
  }

  // ── Events ────────────────────────────────────────────────────────────────────
  selectEl.addEventListener("change", function(e) {
    activeItem = videoItems[parseInt(e.target.value, 10)] || null;
    overlay.textContent = "Ready";
  });
  playBtn.addEventListener("click", function() {
    if (!activeItem) { overlay.textContent = "No file selected"; return; }
    playVideo(activeItem);
  });
  stopBtn.addEventListener("click", stopPlayback);
  window.addEventListener("resize", resizeCanvas);
  window.addEventListener("orientationchange", resizeCanvas);

  clearDisplay();
  loadFiles();
})();
</script>
</body>
</html>
