<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>YouTube Guest Browser</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>YouTube Guest Browser</h1>
    <form id="searchForm">
        <input type="text" id="searchQuery" placeholder="Search YouTube videos..." required>
        <button type="submit">Search</button>
    </form>
    <div id="results"></div>
    <div id="playerModal" class="modal">
        <div class="modal-content">
            <span id="closeBtn">&times;</span>
            <iframe id="videoPlayer" src="" frameborder="0" allowfullscreen></iframe>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
